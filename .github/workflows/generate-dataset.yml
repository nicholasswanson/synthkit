name: Generate Dataset

on:
  repository_dispatch:
    types: [generate-dataset]
  workflow_dispatch:
    inputs:
      businessType:
        description: 'Business Type'
        required: true
        default: 'b2b-saas-subscriptions'
        type: choice
        options:
          - 'b2b-saas-subscriptions'
          - 'checkout-ecommerce'
          - 'food-delivery-platform'
          - 'consumer-fitness-app'
          - 'b2b-invoicing'
          - 'property-management-platform'
          - 'creator-platform'
          - 'donation-marketplace'
      stage:
        description: 'Stage'
        required: true
        default: 'growth'
        type: choice
        options:
          - 'early'
          - 'growth'
          - 'enterprise'
      scenarioId:
        description: 'Scenario ID'
        required: true
        default: '12345'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
          
      - name: Generate dataset
        id: generate
        run: |
          pnpm exec tsx scripts/generate-dataset.js \
            "${{ github.event.client_payload.businessType || github.event.inputs.businessType || 'b2b-saas-subscriptions' }}" \
            "${{ github.event.client_payload.stage || github.event.inputs.stage || 'growth' }}" \
            "${{ github.event.client_payload.scenarioId || github.event.inputs.scenarioId || '12345' }}" \
            "${{ github.event.client_payload.filename || '' }}"
          
      - name: Commit and push dataset
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Add generated dataset for ${{ github.event.client_payload.businessType || github.event.inputs.businessType || 'b2b-saas-subscriptions' }} (${{ github.event.client_payload.stage || github.event.inputs.stage || 'growth' }})"
          branch: main
          file_pattern: 'datasets/*.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p page-artifact
          cp -R datasets page-artifact/datasets

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./page-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
